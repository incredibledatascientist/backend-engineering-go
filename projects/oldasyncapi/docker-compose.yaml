services:
  postgres:
    image: postgres
    container_name: postgredb
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres:/var/lib/postgresql/data/
    ports:
      - ${DB_PORT}:5432
  volumes:
    postgres_data:
    driver: local